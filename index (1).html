<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifaDigital - Fabián Cárdenas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .number-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
        .num-card { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
        .status-disponible { background-color: white; color: #333; }
        .status-apartado { background-color: #fb923c; color: white; border: none; }
        .status-cancelado { background-color: #22c55e; color: white; border: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 pb-20">

    <header class="max-w-4xl mx-auto mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue-700">RIFA DIGITAL</h1>
        <p class="text-gray-600 font-medium">Gestión de 1,000 Números (000-999)</p>
    </header>

    <div class="max-w-4xl mx-auto space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-sm flex gap-2">
            <input type="number" id="searchInput" placeholder="Buscar número (ej. 250)" class="flex-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            <button onclick="buscarNumero()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Buscar</button>
        </div>

        <div class="grid grid-cols-3 gap-2 text-center text-xs font-bold">
            <div class="bg-white p-2 rounded shadow-sm border-b-4 border-orange-400">APARTADOS: <span id="stat-apartado">0</span></div>
            <div class="bg-white p-2 rounded shadow-sm border-b-4 border-green-500">PAGADOS: <span id="stat-cancelado">0</span></div>
            <div class="bg-white p-2 rounded shadow-sm border-b-4 border-gray-300">LIBRES: <span id="stat-libre">1000</span></div>
        </div>

        <div id="gridContainer" class="number-grid bg-white p-4 rounded-xl shadow-sm h-[500px] overflow-y-auto">
            </div>

        <div class="flex gap-2 justify-center py-4">
            <button onclick="exportarDatos()" class="text-xs bg-gray-200 p-2 rounded border border-gray-400">Exportar Copia (WhatsApp)</button>
            <button onclick="importarDatos()" class="text-xs bg-gray-200 p-2 rounded border border-gray-400">Importar Copia</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 space-y-4">
            <h2 class="text-xl font-bold">Editar Número: <span id="modalNumTitle"></span></h2>
            <div>
                <label class="block text-sm font-medium text-gray-700">Cliente</label>
                <input type="text" id="inputCliente" class="w-full p-2 border rounded-lg mt-1">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Estado</label>
                <select id="inputEstado" class="w-full p-2 border rounded-lg mt-1">
                    <option value="disponible">Disponible (Blanco)</option>
                    <option value="apartado">Apartado (Naranja)</option>
                    <option value="cancelado">Cancelado (Verde)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Abono ($ / Pesos)</label>
                <input type="number" id="inputAbono" class="w-full p-2 border rounded-lg mt-1">
            </div>
            <div class="flex gap-2">
                <button onclick="cerrarModal()" class="flex-1 py-2 bg-gray-200 rounded-lg font-bold">Cerrar</button>
                <button onclick="guardarCambios()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let rifaData = JSON.parse(localStorage.getItem('rifa_fabian_data')) || {};
        let currentEditing = null;

        function initGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            let counts = { disponible: 0, apartado: 0, cancelado: 0 };

            for (let i = 0; i < 1000; i++) {
                const numStr = i.toString().padStart(3, '0');
                const data = rifaData[numStr] || { estado: 'disponible' };
                counts[data.estado]++;

                const div = document.createElement('div');
                div.id = 'num-' + numStr;
                div.className = `num-card status-${data.estado}`;
                div.textContent = numStr;
                div.onclick = () => abrirModal(numStr);
                container.appendChild(div);
            }
            document.getElementById('stat-apartado').textContent = counts.apartado;
            document.getElementById('stat-cancelado').textContent = counts.cancelado;
            document.getElementById('stat-libre').textContent = counts.disponible;
        }

        function abrirModal(num) {
            currentEditing = num;
            const data = rifaData[num] || { estado: 'disponible', cliente: '', abono: 0 };
            document.getElementById('modalNumTitle').textContent = num;
            document.getElementById('inputCliente').value = data.cliente || '';
            document.getElementById('inputEstado').value = data.estado;
            document.getElementById('inputAbono').value = data.abono || 0;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function guardarCambios() {
            rifaData[currentEditing] = {
                estado: document.getElementById('inputEstado').value,
                cliente: document.getElementById('inputCliente').value,
                abono: document.getElementById('inputAbono').value
            };
            localStorage.setItem('rifa_fabian_data', JSON.stringify(rifaData));
            initGrid();
            cerrarModal();
        }

        function buscarNumero() {
            const val = document.getElementById('searchInput').value.padStart(3, '0');
            const target = document.getElementById('num-' + val);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('ring-4', 'ring-blue-500');
                setTimeout(() => target.classList.remove('ring-4', 'ring-blue-500'), 3000);
            }
        }

        function exportarDatos() {
            const blob = new Blob([JSON.stringify(rifaData)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'respaldo_rifa_fabian.json';
            a.click();
        }

        function importarDatos() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    rifaData = JSON.parse(event.target.result);
                    localStorage.setItem('rifa_fabian_data', JSON.stringify(rifaData));
                    initGrid();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        initGrid();
    </script>
</body>
</html>
